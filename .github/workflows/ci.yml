name: C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build order book tests
        run: |
          mkdir -p build
          clang++ -std=c++20 -Iinclude \
            tests/test_order_book.cpp src/OrderBook.cpp src/MatchingEngine.cpp src/MarketDataReplay.cpp \
            -o build/test_order_book

      - name: Build market data replay tests
        run: |
          clang++ -std=c++20 -Iinclude \
            tests/test_market_data_replay.cpp src/OrderBook.cpp src/MatchingEngine.cpp src/MarketDataReplay.cpp \
            -o build/test_market_data_replay

      - name: Build benchmark runner
        run: |
          clang++ -std=c++20 -O3 -DNDEBUG -Iinclude \
            benchmarks/bench_order_book.cpp src/OrderBook.cpp src/MatchingEngine.cpp \
            -o build/bench_order_book

      - name: Build latency benchmark runner
        run: |
          clang++ -std=c++20 -O3 -DNDEBUG -Iinclude \
            benchmarks/bench_order_book_latency.cpp src/OrderBook.cpp src/MatchingEngine.cpp \
            -o build/bench_order_book_latency

      - name: Run order book tests
        run: ./build/test_order_book

      - name: Run market data replay tests
        run: ./build/test_market_data_replay

      - name: Smoke test benchmark runner
        run: ./build/bench_order_book 1000

      - name: Smoke test latency benchmark runner
        run: ./build/bench_order_book_latency 1000
