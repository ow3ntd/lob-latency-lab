name: C++ CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure Debug build
        run: cmake -S . -B build-ci -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-ci --parallel

      - name: Run tests
        run: ctest --test-dir build-ci --output-on-failure --no-tests=error

      - name: Smoke test benchmark runner
        run: ./build-ci/bench_order_book 1000
